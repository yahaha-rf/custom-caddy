name: Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Weekly on Saturday during a quiet local window; avoid minute 0 because GitHub Actions
    # scheduled runs can be delayed around the start of each hour.
    - cron: '37 3 * * 6'
      timezone: Asia/Shanghai

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 优化 1：设置 QEMU，这是构建多架构镜像（如 ARM64）的前提
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 优化 2：更智能的标签管理和变量复用
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 直接读取 Secrets 中的用户名，避免硬编码
          images: ${{ secrets.DOCKERHUB_USERNAME }}/custom-caddy
          tags: |
            # 1. 只要是默认分支 (通常是 main)，就打上 latest 标签 (完美兼容手动触发)
            type=raw,value=latest,enable={{is_default_branch}}
            # 2. 自动提取当前运行的分支名 (比如 main, dev) 作为标签
            type=ref,event=branch
            # 3. 如果你发布了 v1.0.0 这种版本，自动打上 1.0.0 标签
            type=semver,pattern={{version}}
            # 4. 附加 Git commit 的前 7 位哈希值 (绝佳的生产环境防滚回策略)
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 优化 3：同时构建并推送 amd64 和 arm64 架构
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
